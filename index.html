<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voolan Legal Policies</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111116;
      --surface: #1a1921;
      --surface-muted: #24222d;
      --text: #f2f0f7;
      --muted: #aaa5b7;
      --border: #34303f;
      --accent: #b7a4ef;
      --accent-strong: #c5b5f6;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.65 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: var(--accent-strong);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 146px 0 72px;
    }

    .masthead {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .eyebrow {
      color: var(--accent-strong);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .masthead h1 {
      max-width: 760px;
      margin: 0;
      color: var(--text);
      font-size: clamp(2rem, 4vw, 3.35rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .masthead p {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .tabs-shell {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      z-index: 10;
      margin: 0;
      padding: 10px max(16px, calc((100vw - 1080px) / 2));
      background: rgba(17, 17, 22, 0.9);
      backdrop-filter: blur(16px);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-muted);
    }

    .tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.93rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .tab:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    .tab[aria-selected="true"] {
      color: var(--accent-strong);
      background: var(--surface);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    .document {
      display: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .document.is-active {
      display: block;
    }

    .document-inner {
      width: min(800px, 100%);
      margin: 0 auto;
      padding: 48px 42px 56px;
    }

    .document h1,
    .document h2,
    .document h3 {
      color: var(--text);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .document h1 {
      margin: 0 0 8px;
      font-size: clamp(1.85rem, 4vw, 2.65rem);
    }

    .document h2 {
      margin: 34px 0 10px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      font-size: 1.24rem;
    }

    .document h3 {
      margin: 26px 0 8px;
      font-size: 1.04rem;
    }

    .document p {
      margin: 0 0 16px;
      color: #d8d4e2;
    }

    .document p:first-of-type {
      color: var(--muted);
    }

    .document ul {
      margin: 0 0 18px;
      padding-left: 22px;
    }

    .document li {
      margin: 7px 0;
      color: #d8d4e2;
    }

    .document table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      font-size: 0.92rem;
    }

    .table-wrap {
      width: 100%;
      margin: 20px 0 24px;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .document th,
    .document td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .document th {
      background: #252232;
      color: var(--text);
      font-weight: 800;
    }

    .document tr:last-child td {
      border-bottom: 0;
    }

    .status {
      padding: 46px;
      color: var(--muted);
      text-align: center;
    }

    .status strong {
      color: var(--text);
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 22px, 1080px);
        padding-top: 208px;
      }

      .tabs {
        grid-template-columns: 1fr;
      }

      .tabs-shell {
        padding: 10px 11px;
      }

      .document-inner {
        padding: 34px 20px 42px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div class="eyebrow">Voolan Policies</div>
    </header>

    <nav class="tabs-shell" aria-label="Policy documents">
      <div class="tabs" role="tablist">
        <a class="tab" id="tab-terms-of-service" role="tab" href="#terms-of-service" aria-controls="terms-of-service">Terms of Service</a>
        <a class="tab" id="tab-privacy-policy" role="tab" href="#privacy-policy" aria-controls="privacy-policy">Privacy Policy</a>
        <a class="tab" id="tab-acceptable-use-policy" role="tab" href="#acceptable-use-policy" aria-controls="acceptable-use-policy">Acceptable Use Policy</a>
      </div>
    </nav>

    <section class="document is-active" id="terms-of-service" role="tabpanel" aria-labelledby="tab-terms-of-service">
      <div class="document-inner status">Loading <strong>Terms of Service</strong>...</div>
    </section>

    <section class="document" id="privacy-policy" role="tabpanel" aria-labelledby="tab-privacy-policy">
      <div class="document-inner status">Loading <strong>Privacy Policy</strong>...</div>
    </section>

    <section class="document" id="acceptable-use-policy" role="tabpanel" aria-labelledby="tab-acceptable-use-policy">
      <div class="document-inner status">Loading <strong>Acceptable Use Policy</strong>...</div>
    </section>
  </main>

  <script>
    const documents = [
      {
        id: "terms-of-service",
        file: "voolan_terms_of_service_filled.md",
        label: "Terms of Service",
        aliases: ["terms", "tos"]
      },
      {
        id: "privacy-policy",
        file: "voolan_privacy_policy_filled.md",
        label: "Privacy Policy",
        aliases: ["privacy"]
      },
      {
        id: "acceptable-use-policy",
        file: "voolan_acceptable_use_policy_filled.md",
        label: "Acceptable Use Policy",
        aliases: ["aup", "acceptable-use"]
      }
    ];

    const headingSlugCounts = new Map();

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function inlineFormat(value) {
      const escaped = escapeHtml(value);
      return escaped.replace(
        /\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/gi,
        (email) => `<a href="mailto:${email}">${email}</a>`
      );
    }

    function slugify(value) {
      const base = value
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "section";
      const count = headingSlugCounts.get(base) || 0;
      headingSlugCounts.set(base, count + 1);
      return count ? `${base}-${count + 1}` : base;
    }

    function isTableSeparator(line) {
      return /^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
    }

    function splitTableRow(line) {
      return line
        .trim()
        .replace(/^\|/, "")
        .replace(/\|$/, "")
        .split("|")
        .map((cell) => cell.trim());
    }

    function renderTable(lines, start) {
      const rows = [];
      let index = start;

      while (index < lines.length && lines[index].trim().startsWith("|")) {
        rows.push(lines[index]);
        index += 1;
      }

      const hasHeader = rows.length > 1 && isTableSeparator(rows[1]);
      const bodyRows = hasHeader ? rows.slice(2) : rows;
      let html = '<div class="table-wrap"><table>';

      if (hasHeader) {
        html += "<thead><tr>";
        splitTableRow(rows[0]).forEach((cell) => {
          html += `<th>${inlineFormat(cell)}</th>`;
        });
        html += "</tr></thead>";
      }

      html += "<tbody>";
      bodyRows.forEach((row) => {
        if (isTableSeparator(row)) return;
        html += "<tr>";
        splitTableRow(row).forEach((cell) => {
          html += `<td>${inlineFormat(cell)}</td>`;
        });
        html += "</tr>";
      });
      html += "</tbody></table></div>";

      return { html, nextIndex: index };
    }

    function parseMarkdown(markdown) {
      headingSlugCounts.clear();
      const lines = markdown.replace(/\r\n?/g, "\n").split("\n");
      let html = "";
      let listOpen = false;

      const closeList = () => {
        if (listOpen) {
          html += "</ul>";
          listOpen = false;
        }
      };

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        const trimmed = line.trim();

        if (!trimmed) {
          closeList();
          continue;
        }

        if (trimmed.startsWith("|")) {
          closeList();
          const table = renderTable(lines, i);
          html += table.html;
          i = table.nextIndex - 1;
          continue;
        }

        const headingMatch = /^(#{1,6})\s+(.+)$/.exec(trimmed);
        if (headingMatch) {
          closeList();
          const markdownLevel = headingMatch[1].length;
          const level = Math.min(Math.max(markdownLevel - 1, 1), 3);
          const text = headingMatch[2];
          html += `<h${level} id="${slugify(text)}">${inlineFormat(text)}</h${level}>`;
          continue;
        }

        const listMatch = /^-\s+(.+)$/.exec(trimmed);
        if (listMatch) {
          if (!listOpen) {
            html += "<ul>";
            listOpen = true;
          }
          html += `<li>${inlineFormat(listMatch[1])}</li>`;
          continue;
        }

        closeList();
        const paragraph = [trimmed];
        while (
          i + 1 < lines.length &&
          lines[i + 1].trim() &&
          !/^(#{1,6})\s+/.test(lines[i + 1].trim()) &&
          !/^-\s+/.test(lines[i + 1].trim()) &&
          !lines[i + 1].trim().startsWith("|")
        ) {
          i += 1;
          paragraph.push(lines[i].trim());
        }
        html += `<p>${inlineFormat(paragraph.join(" "))}</p>`;
      }

      closeList();
      return html;
    }

    function documentFromHash() {
      const requested = decodeURIComponent(window.location.hash.replace(/^#/, ""));
      const fallback = documents[0];
      return documents.find((document) => {
        return document.id === requested || document.aliases.includes(requested);
      }) || fallback;
    }

    function activateDocument(documentId, updateHash = true) {
      documents.forEach((document) => {
        const active = document.id === documentId;
        const panel = document.getPanel();
        const tab = document.getTab();

        panel.classList.toggle("is-active", active);
        panel.hidden = !active;
        tab.setAttribute("aria-selected", String(active));
        tab.tabIndex = active ? 0 : -1;
      });

      if (updateHash && window.location.hash !== `#${documentId}`) {
        history.replaceState(null, "", `#${documentId}`);
      }
    }

    async function loadDocuments() {
      await Promise.all(documents.map(async (document) => {
        const panel = document.getPanel();

        try {
          const response = await fetch(document.file, { cache: "no-cache" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const markdown = await response.text();
          panel.innerHTML = `<div class="document-inner">${parseMarkdown(markdown)}</div>`;
        } catch (error) {
          panel.innerHTML = `
            <div class="document-inner status">
              <strong>${document.label}</strong> could not be loaded.
              <br>
              <a href="${document.file}">Open the Markdown version</a>
            </div>
          `;
        }
      }));
    }

    documents.forEach((document) => {
      document.getPanel = () => document.getPanel.cache || (document.getPanel.cache = document.getPanelElement());
      document.getPanelElement = () => window.document.getElementById(document.id);
      document.getTab = () => document.getTab.cache || (document.getTab.cache = window.document.getElementById(`tab-${document.id}`));
      document.getTabElement = () => window.document.getElementById(`tab-${document.id}`);

      document.getTabElement().addEventListener("click", (event) => {
        event.preventDefault();
        activateDocument(document.id);
      });
    });

    window.addEventListener("hashchange", () => {
      activateDocument(documentFromHash().id, false);
    });

    activateDocument(documentFromHash().id, false);
    loadDocuments();
  </script>
</body>
</html>
